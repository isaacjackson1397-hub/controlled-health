<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlled Health | Careers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, input, select, button, textarea { font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen relative overflow-x-hidden">

    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-50 p-2 bg-white rounded-lg shadow-md hover:bg-slate-100 transition-all border border-slate-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
    </button>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 ease-in-out border-r border-slate-100 overflow-y-auto">
        <div class="p-8">
            <h2 class="text-2xl font-bold text-blue-900 mb-8">Controlled Health</h2>
                <nav class="space-y-2">
                    <a href="index.html" class="group flex items-center py-2 text-slate-500 hover:text-blue-900 transition-colors pl-3 -ml-3">
                        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-blue-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> Home
                    </a>
                    <a href="physicians.html" class="group flex items-center py-2 text-slate-500 hover:text-blue-900 transition-colors pl-3 -ml-3">
                        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-blue-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg> For Physicians
                    </a>
                    <a href="patients.html" class="group flex items-center py-2 text-slate-500 hover:text-blue-900 transition-colors pl-3 -ml-3">
                        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-blue-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg> For Patients
                    </a>
                    <a href="waitlist.html" class="group flex items-center py-2 text-slate-500 hover:text-blue-900 transition-colors pl-3 -ml-3">
                        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-blue-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg> Join Waitlist
                    </a>
                    <a href="about.html" class="group flex items-center py-2 text-slate-500 hover:text-blue-900 transition-colors pl-3 -ml-3">
                        <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-blue-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> About
                    </a>
                </nav>
        </div>
        <button onclick="toggleSidebar()" class="absolute top-6 right-4 text-slate-400 hover:text-slate-600">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden transition-opacity"></div>

    <main class="flex flex-col items-center justify-center min-h-screen p-6 py-12">
       <div class="max-w-2xl w-full text-center">
        
        <div class="mb-10 p-4 bg-blue-50 border border-blue-200 rounded-xl shadow-sm text-blue-900">
            <p class="font-medium">
                Are you a physician looking to join our platform? 
                <a href="waitlist.html" class="font-bold underline hover:text-blue-600 transition-colors ml-1">Please fill out this form instead.</a>
            </p>
        </div>

        <h1 class="text-3xl md:text-4xl font-bold text-blue-900 mb-8 tracking-tight">
            Career Opportunities
        </h1>
        
        <form id="career-form" class="max-w-xl mx-auto space-y-6 text-left bg-white p-8 md:p-10 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
            
            <div class="space-y-4">
                <h3 class="font-bold text-lg text-slate-800 border-b border-slate-100 pb-2">Contact Information</h3>
                <input type="text" name="name" required placeholder="Full Name" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="email" name="email" required placeholder="Email Address" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="tel" name="phone" required placeholder="Phone Number" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="space-y-4 pt-4">
                <h3 class="font-bold text-lg text-slate-800 border-b border-slate-100 pb-2">Education</h3>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Highest level of education completed?</label>
                    <select name="education_level" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                        <option value="" disabled selected hidden>Select an option...</option>
                        <option value="High School">High School Diploma</option>
                        <option value="Bachelors">Bachelor's Degree</option>
                        <option value="Masters">Master's Degree</option>
                        <option value="Doctorate">Doctorate or Professional Degree</option>
                    </select>
                </div>
                <input type="text" name="degree_info" placeholder="Degree and Institution (e.g., B.S. Economics, Weber State)" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="space-y-4 pt-4">
                <h3 class="font-bold text-lg text-slate-800 border-b border-slate-100 pb-2">Experience</h3>
                <input type="text" name="role_interest" required placeholder="What role or department are you interested in?" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea name="experience_desc" rows="3" placeholder="Briefly describe your most relevant experience or current role." class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <div class="space-y-4 pt-4">
                <h3 class="font-bold text-lg text-slate-800 border-b border-slate-100 pb-2">Why Controlled-Health?</h3>
                <textarea name="interest_reason" rows="4" required placeholder="Why are you interested in joining our team and our mission?" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-900 hover:bg-slate-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-200 text-lg mt-6">
                Submit Application
            </button>
        </form>
        </div>
    </main>

   <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // --- PASTE YOUR NEW CAREERS WEB APP URL BELOW ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzCTbbU5NpmGK2NuqsQyKdKk6ue2UFvKN2fqVcySs0Wdt0xMykK1Vh7xp0RiYRjr13iNQ/exec'; 
        const form = document.getElementById('career-form');
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = 'Submitting...';
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert("Thank you! Your application has been submitted.");
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = 'Submit Application';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("There was an error submitting your form. Please try again.");
                    btn.disabled = false;
                    btn.innerText = 'Submit Application';
                });
        });
    </script>
</body>
</html>
